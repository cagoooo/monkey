name: Deploy 🐒 Monkey to GitHub Pages 🚢

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm install

      - name: Build 🏗️
        run: npm run build
        env:
          GEMINI_API_KEY: "__GEMINI_API_KEY__" # 依照使用者規範使用佔位符

      - name: Inject Secrets 💉
        run: python .github/inject.py
        env:
          GEMINI_API_KEY_REAL: ${{ secrets.GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages # 這是 GitHub Pages 的標準分支
